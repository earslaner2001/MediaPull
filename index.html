<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <title>MediaPull</title>
  <link rel="icon" type="image/x-icon" href="icon.ico">
  <link rel="icon" type="image/png" href="icon.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Share Tech Mono', monospace;
      background: #0c0c0e;
      color: #ff4c4c;
      display: flex;
      flex-direction: column;
      text-shadow: 0 0 5px #ff4c4c, 0 0 10px #ff1c1c;
    }

    /* ── Özel pencere çerçevesi ── */
    .titlebar {
      flex-shrink: 0;
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      height: 36px;
      background: rgba(6, 6, 8, 0.97);
      border-bottom: 1px solid rgba(255, 68, 68, 0.4);
      box-shadow: 0 1px 18px rgba(255, 0, 0, 0.12);
      user-select: none;
      -webkit-user-select: none;
      z-index: 100;
    }

    .titlebar-drag {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
      min-width: 0;
      -webkit-app-region: drag;
    }

    .titlebar-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border-radius: 3px;
    }

    .titlebar-title {
      font-size: 12px;
      letter-spacing: 0.06em;
      color: #ff6666;
      text-shadow: 0 0 8px rgba(255, 76, 76, 0.6);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .titlebar-controls {
      display: flex;
      flex-shrink: 0;
      -webkit-app-region: no-drag;
    }

    .win-btn {
      width: 46px;
      height: 36px;
      margin: 0;
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      color: rgba(255, 180, 180, 0.75);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
      text-shadow: none;
      font-family: inherit;
    }
    .win-btn:hover {
      background: rgba(255, 68, 68, 0.18);
      color: #ffcccc;
      transform: none;
      box-shadow: none;
    }
    .win-btn.close:hover {
      background: #c42b1c;
      color: #fff;
    }
    .win-btn svg {
      width: 10px;
      height: 10px;
      fill: currentColor;
      pointer-events: none;
    }

    .app-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 14px 18px 48px;
      position: relative;
      background:
        linear-gradient(rgba(12, 12, 14, 0.93), rgba(12, 12, 14, 0.93)),
        url('https://i.pinimg.com/originals/06/60/ef/0660efe82fa3da42ed56eef013171835.gif')
        no-repeat center center;
      background-size: cover;
    }

    h2 { font-size: 1.15rem; margin: 0 0 6px; }
    h3 { font-size: 0.95rem; margin: 0 0 4px; color: #ff4c4c; }

    input, select, button {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 8px 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    input, select {
      background-color: rgba(28, 28, 30, 0.95);
      color: #ffdddd;
    }

    button.dl-btn {
      background: linear-gradient(135deg, #ff0000, #990000);
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.1s ease-in-out, box-shadow 0.2s, opacity 0.2s;
      text-shadow: 0 0 5px white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button.dl-btn:hover:not(:disabled) {
      transform: scale(1.03);
      box-shadow: 0 0 15px #ff0000a0;
    }
    button.dl-btn:active:not(:disabled) { transform: scale(0.97); }
    button.dl-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    /* spinner */
    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    .spinner.visible { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    hr {
      border: none;
      height: 1px;
      background-color: #ff4444;
      margin: 14px 0;
    }

    /* ── Progress alanı ── */
    #dl-status {
      margin: 8px 0 0;
      font-size: 12px;
      line-height: 1.4;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 5px red, 0 0 10px #ff4444;
      word-break: break-word;
      min-height: 1.4em;
    }
    #dl-status:empty { min-height: 0; }
    #dl-status.error { color: #ff6666; text-shadow: none; }
    #dl-status.success { color: #88ffbb; text-shadow: 0 0 8px #00ff88; }

    #dl-panel {
      margin-top: 10px;
      display: none;
    }
    #dl-panel.visible { display: block; }

    .dl-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 5px;
      gap: 8px;
    }

    #dl-phase {
      font-size: 12px;
      color: #ffaaaa;
      text-shadow: none;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #dl-percent {
      font-size: 12px;
      color: #ff8888;
      text-shadow: none;
      white-space: nowrap;
    }

    /* custom progress bar */
    .bar-wrap {
      width: 100%;
      height: 12px;
      background: #1a1a1a;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,68,68,0.3);
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #cc0000, #ff4444);
      border-radius: 999px;
      /* Sadece ileri gidişte animasyon; geri dönüşte (yeni akış sıfırlaması) anında geçiş */
      transition: width 0.35s ease;
      position: relative;
      overflow: hidden;
    }
    .bar-fill.no-transition {
      transition: none;
    }

    /* şerit animasyonu */
    .bar-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 12px,
        rgba(255,255,255,0.07) 12px,
        rgba(255,255,255,0.07) 24px
      );
      animation: stripe 1.2s linear infinite;
    }
    @keyframes stripe {
      from { background-position: 0 0; }
      to   { background-position: 48px 0; }
    }

    .dl-metrics {
      display: flex;
      justify-content: space-between;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .metric {
      font-size: 11px;
      color: rgba(255, 200, 200, 0.7);
      text-shadow: none;
    }
    .metric span {
      color: #ffdddd;
    }

    .dl-controls {
      display: none;
      gap: 8px;
      margin-top: 10px;
    }
    .dl-controls.visible {
      display: flex;
    }

    button.ctrl-btn {
      flex: 1;
      margin-top: 0;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid rgba(255, 68, 68, 0.45);
      background: rgba(30, 30, 30, 0.95);
      color: #ffcccc;
      text-shadow: none;
      transition: background 0.15s, border-color 0.15s, opacity 0.2s;
    }
    button.ctrl-btn:hover:not(:disabled) {
      background: rgba(50, 20, 20, 0.95);
      border-color: rgba(255, 68, 68, 0.75);
      transform: none;
      box-shadow: none;
    }
    button.ctrl-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    button.ctrl-btn.stop {
      border-color: rgba(255, 100, 100, 0.6);
      color: #ffaaaa;
    }

    .bar-fill.paused::after {
      animation-play-state: paused;
    }

    /* ── Log kutusu ── */
    .log-section {
      margin-top: 12px;
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      gap: 8px;
    }

    .log-title {
      font-size: 11px;
      color: rgba(255, 180, 180, 0.65);
      text-shadow: none;
    }

    button.log-toggle {
      display: inline-block;
      width: auto;
      margin: 0;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: normal;
      border-radius: 6px;
      border: 1px solid rgba(255, 68, 68, 0.35);
      background: rgba(20, 20, 20, 0.9);
      color: rgba(255, 200, 200, 0.75);
      cursor: pointer;
      text-shadow: none;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    button.log-toggle:hover {
      background: rgba(40, 20, 20, 0.95);
      border-color: rgba(255, 68, 68, 0.6);
      color: #ffcccc;
      transform: none;
      box-shadow: none;
    }

    #log-box {
      background: rgba(0, 0, 0, 0.75);
      border: 1px solid rgba(255, 68, 68, 0.35);
      border-radius: 8px;
      padding: 8px 10px;
      height: 130px;
      overflow-y: auto;
      font-size: 11px;
      color: rgba(255, 200, 200, 0.7);
      text-shadow: none;
      line-height: 1.55;
      word-break: break-all;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,68,68,0.4) transparent;
      transition: height 0.2s ease, padding 0.2s ease, opacity 0.2s ease, border-color 0.2s ease;
    }
    #log-box.hidden {
      height: 0;
      padding: 0 10px;
      overflow: hidden;
      opacity: 0;
      border-color: transparent;
    }
    #log-box::-webkit-scrollbar { width: 4px; }
    #log-box::-webkit-scrollbar-track { background: transparent; }
    #log-box::-webkit-scrollbar-thumb { background: rgba(255,68,68,0.4); border-radius: 2px; }

    .log-line { display: block; }
    .log-line.info  { color: rgba(255, 200, 200, 0.65); }
    .log-line.ok    { color: #88ffbb; }
    .log-line.warn  { color: #ffdd88; }
    .log-line.err   { color: #ff6666; }
    .log-line.dim   { color: rgba(255, 160, 160, 0.35); }

    /* köşe linki */
    .app-corner {
      position: fixed;
      right: 14px;
      bottom: 10px;
      z-index: 20;
    }
    .corner-link {
      display: inline;
      width: auto;
      margin: 0; padding: 0;
      font-size: 11px; font-weight: normal;
      background: none; border: none; border-radius: 0;
      color: rgba(255, 180, 180, 0.55);
      cursor: pointer;
      text-shadow: none; box-shadow: none;
      transition: color 0.15s;
    }
    .corner-link:hover { color: rgba(255,100,100,0.95); text-decoration: underline; }
    .corner-link:active, .corner-link:hover { transform: none; box-shadow: none; }
  </style>
</head>

<body>
  <header class="titlebar" id="titlebar">
    <div class="titlebar-drag">
      <img class="titlebar-icon" src="icon.png" alt="" width="16" height="16" />
      <span class="titlebar-title">MediaPull</span>
    </div>
    <div class="titlebar-controls">
      <button type="button" class="win-btn" id="btnWinMin" title="Küçült" aria-label="Küçült">
        <svg viewBox="0 0 10 10"><rect y="4.5" width="10" height="1"/></svg>
      </button>
      <button type="button" class="win-btn" id="btnWinMax" title="Büyüt" aria-label="Büyüt">
        <svg id="iconMaximize" viewBox="0 0 10 10"><rect x="0.5" y="0.5" width="9" height="9" fill="none" stroke="currentColor" stroke-width="1"/></svg>
        <svg id="iconRestore" viewBox="0 0 10 10" style="display:none"><rect x="2.5" y="0.5" width="7" height="7" fill="none" stroke="currentColor" stroke-width="1"/><rect x="0.5" y="2.5" width="7" height="7" fill="rgba(6,6,8,0.97)" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <button type="button" class="win-btn close" id="btnWinClose" title="Kapat" aria-label="Kapat">
        <svg viewBox="0 0 10 10"><path d="M1 1 L9 9 M9 1 L1 9" stroke="currentColor" stroke-width="1.1" fill="none"/></svg>
      </button>
    </div>
  </header>

  <main class="app-content">
  <h3>Twitter / X Video İndir</h3>
  <input type="text" id="twurl" placeholder="Tweet veya video bağlantısını yapıştır" />
  <button type="button" class="dl-btn" id="btnTw" onclick="playClick(); startDownloadTwitter()">
    <span class="spinner" id="spnTw"></span>
    <span id="lblTw">Twitter / X videosunu indir</span>
  </button>

  <hr />

  <h3>YouTube Video İndir</h3>
  <input type="text" id="yturl" placeholder="YouTube video linkini yapıştır" />
  <select id="format">
    <option value="bestvideo[height<=1080][ext=mp4]+bestaudio[ext=m4a]/bestvideo[height<=1080]+bestaudio[ext=m4a]/best[height<=1080]">1080p MP4 (video + ses)</option>
    <option value="bestaudio">Sadece Ses (MP3)</option>
  </select>
  <button type="button" class="dl-btn" id="btnYT" onclick="playClick(); startDownloadYT()">
    <span class="spinner" id="spnYT"></span>
    <span id="lblYT">YouTube'dan İndir</span>
  </button>

  <!-- Hata / başarı mesajı (her zaman görünür) -->
  <p id="dl-status"></p>

  <!-- İlerleme paneli (yalnızca indirme başlayınca) -->
  <div id="dl-panel">
    <div class="dl-header">
      <span id="dl-phase">Analiz ediliyor...</span>
      <span id="dl-percent"></span>
    </div>
    <div class="bar-wrap">
      <div class="bar-fill" id="barFill"></div>
    </div>
    <div class="dl-metrics">
      <span class="metric" id="metSpeed" style="display:none">Hız: <span>—</span></span>
      <span class="metric" id="metSize"  style="display:none">Boyut: <span>—</span></span>
      <span class="metric" id="metEta"   style="display:none">Kalan: <span>—</span></span>
    </div>
    <div class="dl-controls" id="dl-controls">
      <button type="button" class="ctrl-btn" id="btnPause" onclick="playClick(); togglePause()">Duraklat</button>
      <button type="button" class="ctrl-btn stop" id="btnStop" onclick="playClick(); stopDownload()">Bitir</button>
    </div>
  </div>

  <!-- Süreç logu -->
  <div class="log-section">
    <div class="log-header">
      <span class="log-title">Süreç logu</span>
      <button type="button" class="log-toggle" id="btnLogToggle" onclick="toggleLog()">Gizle</button>
    </div>
    <div id="log-box"></div>
  </div>

  <footer class="app-corner">
    <button type="button" class="corner-link" onclick="openSite()">(c) 2026 MediaPull · site</button>
  </footer>
  </main>

  <script>
    const { ipcRenderer, shell } = require('electron');
    const SITE_URL = 'https://media-pull.vercel.app/';

    // ── Pencere kontrolleri ──────────────────────────────
    const titlebar = document.getElementById('titlebar');
    const iconMaximize = document.getElementById('iconMaximize');
    const iconRestore = document.getElementById('iconRestore');
    const btnWinMax = document.getElementById('btnWinMax');

    function setMaximizedState(maximized) {
      iconMaximize.style.display = maximized ? 'none' : 'block';
      iconRestore.style.display = maximized ? 'block' : 'none';
      btnWinMax.title = maximized ? 'Geri al' : 'Büyüt';
      btnWinMax.setAttribute('aria-label', maximized ? 'Geri al' : 'Büyüt');
    }

    document.getElementById('btnWinMin').addEventListener('click', () => {
      ipcRenderer.send('window-minimize');
    });
    btnWinMax.addEventListener('click', () => {
      ipcRenderer.send('window-maximize');
    });
    document.getElementById('btnWinClose').addEventListener('click', () => {
      ipcRenderer.send('window-close');
    });

    titlebar.addEventListener('dblclick', (e) => {
      if (e.target.closest('.titlebar-controls')) return;
      ipcRenderer.send('window-maximize');
    });

    ipcRenderer.on('window-maximized', (_e, maximized) => {
      setMaximizedState(maximized);
    });

    // ── Log ──────────────────────────────────────────────
    const logBox = document.getElementById('log-box');
    const LOG_VISIBLE_KEY = 'mediapull-log-visible';
    let logVisible = localStorage.getItem(LOG_VISIBLE_KEY) !== '0';

    function applyLogVisibility() {
      logBox.classList.toggle('hidden', !logVisible);
      document.getElementById('btnLogToggle').textContent = logVisible ? 'Gizle' : 'Göster';
    }

    function toggleLog() {
      logVisible = !logVisible;
      localStorage.setItem(LOG_VISIBLE_KEY, logVisible ? '1' : '0');
      applyLogVisibility();
    }

    applyLogVisibility();

    function logLine(text, type = 'info') {
      const span = document.createElement('span');
      span.className = `log-line ${type}`;
      span.textContent = `[${new Date().toLocaleTimeString('tr-TR')}] ${text}`;
      logBox.appendChild(span);
      logBox.scrollTop = logBox.scrollHeight;
    }

    function clearLog() {
      logBox.innerHTML = '';
    }

    // ── Ses ──────────────────────────────────────────────
    function assetUrl(p) { return new URL(p, window.location.href).href; }
    const sfxClick   = new Audio(assetUrl('assets/Web Button Click.mp3'));
    const sfxSuccess = new Audio(assetUrl('assets/download succes.mp3'));
    sfxClick.preload = sfxSuccess.preload = 'auto';
    function playClick()   { sfxClick.currentTime   = 0; void sfxClick.play().catch(()=>{}); }
    function playSuccess() { sfxSuccess.currentTime = 0; void sfxSuccess.play().catch(()=>{}); }

    // ── Site linki ───────────────────────────────────────
    function openSite() { shell.openExternal(SITE_URL); }

    // ── Buton yönetimi ───────────────────────────────────
    let activeBtnId = null;
    let isPaused = false;

    function showControls() {
      document.getElementById('dl-controls').classList.add('visible');
      document.getElementById('btnPause').disabled = false;
      document.getElementById('btnStop').disabled = false;
      document.getElementById('btnPause').textContent = 'Duraklat';
      isPaused = false;
      document.getElementById('barFill').classList.remove('paused');
    }

    function hideControls() {
      document.getElementById('dl-controls').classList.remove('visible');
      isPaused = false;
      document.getElementById('barFill').classList.remove('paused');
    }

    function togglePause() {
      if (isPaused) {
        ipcRenderer.send('resume-ytdlp');
      } else {
        document.getElementById('btnPause').disabled = true;
        ipcRenderer.send('pause-ytdlp');
      }
    }

    function stopDownload() {
      document.getElementById('btnPause').disabled = true;
      document.getElementById('btnStop').disabled = true;
      ipcRenderer.send('stop-ytdlp');
    }

    const DL_BTN_IDS = ['btnTw', 'btnYT'];
    const DL_BTN_META = {
      btnTw: { lbl: 'lblTw', spn: 'spnTw', label: 'Twitter / X videosunu indir' },
      btnYT: { lbl: 'lblYT', spn: 'spnYT', label: "YouTube'dan İndir" },
    };

    function lockBtn(btnId) {
      activeBtnId = btnId;
      DL_BTN_IDS.forEach((id) => { document.getElementById(id).disabled = true; });
      const meta = DL_BTN_META[btnId];
      document.getElementById(meta.lbl).textContent = 'İndiriliyor...';
      document.getElementById(meta.spn).classList.add('visible');
    }

    function unlockBtns() {
      DL_BTN_IDS.forEach((id) => {
        document.getElementById(id).disabled = false;
        const meta = DL_BTN_META[id];
        document.getElementById(meta.lbl).textContent = meta.label;
        document.getElementById(meta.spn).classList.remove('visible');
      });
      activeBtnId = null;
      hideControls();
    }

    // ── Progress paneli ──────────────────────────────────
    const PHASE_LABELS = {
      analyzing:   'Analiz ediliyor...',
      downloading: 'Video verisi alınıyor...',
      merging:     'Video ve ses birleştiriliyor...',
      converting:  'Dönüştürülüyor...',
      paused:      'Duraklatıldı',
      done:        'İndirme tamamlandı!',
    };

    function showPanel() {
      document.getElementById('dl-panel').classList.add('visible');
    }

    function setPhase(phase) {
      if (phase !== 'paused') lastPhase = phase;
      document.getElementById('dl-phase').textContent = PHASE_LABELS[phase] ?? phase;
    }

    const STREAM_LABELS = ['Video indiriliyor...', 'Ses indiriliyor...'];
    let lastPhase = 'analyzing';

    function setBar(percent, instant = false) {
      const fill = document.getElementById('barFill');
      if (instant) {
        fill.classList.add('no-transition');
        // Bir sonraki frame'de transition'ı geri aç
        requestAnimationFrame(() => requestAnimationFrame(() => fill.classList.remove('no-transition')));
      }
      fill.style.width = Math.min(100, percent) + '%';
      document.getElementById('dl-percent').textContent = percent < 100 ? `%${percent.toFixed(1)}` : '%100';
    }

    function setMetric(id, label, value) {
      const el = document.getElementById(id);
      if (!value) { el.style.display = 'none'; return; }
      el.style.display = 'inline';
      el.querySelector('span').textContent = value;
    }

    function setStatus(msg, type = '') {
      const el = document.getElementById('dl-status');
      el.textContent = msg;
      el.className = type;
    }

    function resetPanel() {
      setBar(0, true);
      lastPhase = 'analyzing';
      setPhase('analyzing');
      document.getElementById('dl-percent').textContent = '';
      setMetric('metSpeed', 'Hız', null);
      setMetric('metSize',  'Boyut', null);
      setMetric('metEta',   'Kalan', null);
      setStatus('');
    }

    // ── URL doğrulama ────────────────────────────────────
    function isTwitterOrXUrl(raw) {
      try {
        const h = new URL(raw.trim()).hostname.toLowerCase();
        return ['twitter.com','www.twitter.com','mobile.twitter.com','x.com','www.x.com'].includes(h);
      } catch { return false; }
    }

    function isYoutubeUrl(raw) {
      try {
        const u = new URL(raw.trim());
        if (u.protocol !== 'http:' && u.protocol !== 'https:') return false;
        const h = u.hostname.toLowerCase();
        return ['youtube.com','www.youtube.com','m.youtube.com','music.youtube.com','youtu.be'].includes(h)
          || h.endsWith('.youtube.com');
      } catch { return false; }
    }

    // ── İndirme başlatıcılar ─────────────────────────────
    function startDownloadTwitter() {
      const url = document.getElementById('twurl').value.trim();
      if (!url || !isTwitterOrXUrl(url)) {
        setStatus('Geçerli bir Twitter veya X bağlantısı gir.', 'error');
        logLine('Geçersiz veya boş Twitter/X linki.', 'err');
        return;
      }
      clearLog();
      logLine('Twitter/X indirmesi başlatılıyor...', 'info');
      logLine(`URL: ${url}`, 'dim');
      lockBtn('btnTw');
      showPanel();
      resetPanel();
      showControls();
      ipcRenderer.send('start-ytdlp', url, 'bestvideo+bestaudio/best');
    }

    function startDownloadYT() {
      const url    = document.getElementById('yturl').value.trim();
      const format = document.getElementById('format').value;
      if (!url) {
        setStatus('Link yok.', 'error');
        logLine('URL girilmedi.', 'err');
        return;
      }
      if (!isYoutubeUrl(url)) {
        setStatus('Geçerli bir YouTube linki gir.', 'error');
        logLine('Geçersiz YouTube linki.', 'err');
        return;
      }
      clearLog();
      logLine('YouTube indirmesi başlatılıyor...', 'info');
      logLine(`URL: ${url}`, 'dim');
      logLine(`Format: ${document.getElementById('format').options[document.getElementById('format').selectedIndex].text}`, 'dim');
      lockBtn('btnYT');
      showPanel();
      resetPanel();
      showControls();
      ipcRenderer.send('start-ytdlp', url, format);
    }

    // ── IPC olayları ─────────────────────────────────────
    ipcRenderer.on('download-phase', (_e, phase) => {
      setPhase(phase);
      logLine(PHASE_LABELS[phase] ?? phase, 'info');
    });

    ipcRenderer.on('download-stream', (_e, idx) => {
      setBar(0, true);
      const label = STREAM_LABELS[idx] ?? 'İndiriliyor...';
      setPhase(label);
      logLine(label, 'info');
    });

    ipcRenderer.on('download-progress', (_e, data) => {
      if (typeof data === 'number') {
        setBar(data);
        return;
      }
      setBar(data.percent);
      setMetric('metSpeed', 'Hız',   data.speed ?? null);
      setMetric('metSize',  'Boyut', data.size  ?? null);
      setMetric('metEta',   'Kalan', data.eta ? `${data.eta}` : null);
    });

    ipcRenderer.on('download-log', (_e, line) => {
      logLine(line, 'dim');
    });

    ipcRenderer.on('download-paused', () => {
      isPaused = true;
      document.getElementById('btnPause').disabled = false;
      document.getElementById('btnPause').textContent = 'Devam Et';
      document.getElementById('barFill').classList.add('paused');
      setPhase('paused');
      setMetric('metSpeed', 'Hız', null);
      setMetric('metEta', 'Kalan', null);
      logLine('İndirme duraklatıldı. Devam Et ile kaldığı yerden sürdürülür.', 'warn');
    });

    ipcRenderer.on('download-resumed', () => {
      isPaused = false;
      document.getElementById('btnPause').textContent = 'Duraklat';
      document.getElementById('barFill').classList.remove('paused');
      setPhase(lastPhase);
      logLine('İndirme devam ediyor.', 'info');
    });

    ipcRenderer.on('download-cancelled', () => {
      setStatus('İndirme iptal edildi.', 'error');
      logLine('İndirme kullanıcı tarafından durduruldu.', 'warn');
      hideControls();
      unlockBtns();
    });

    ipcRenderer.on('download-complete', (_e, file) => {
      setBar(100);
      setPhase('done');
      setMetric('metSpeed', 'Hız', null);
      setMetric('metEta',   'Kalan', null);
      setStatus(`${file} indirildi.`, 'success');
      logLine(`Tamamlandi: ${file}`, 'ok');
      unlockBtns();
      playSuccess();
    });

    ipcRenderer.on('download-error', (_e, message) => {
      setStatus(`Hata: ${message}`, 'error');
      logLine(`Hata: ${message}`, 'err');
      unlockBtns();
    });
  </script>
</body>

</html>
